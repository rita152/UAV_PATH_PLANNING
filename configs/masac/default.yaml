# UAV路径规划 - 默认配置文件

# 环境配置
environment:
  n_leaders: 1           # 领导者无人机数量
  n_followers: 2         # 跟随者无人机数量（可动态配置）
  render: false          # 是否渲染可视化界面
  obstacle_num: 1        # 障碍物数量
  goal_num: 1           # 目标数量

# 训练配置
training:
  max_episodes: 500      # 最大训练轮数
  max_steps: 1000        # 每轮最大步数
  train_num: 1          # 训练次数
  test_episodes: 100    # 测试轮数

# 强化学习算法配置
algorithm:
  gamma: 0.95           # 折扣因子（提高到0.95以更好地考虑长期奖励）
  batch_size: 128       # 批次大小
  memory_capacity: 20000 # 经验回放容量
  
  # 学习率配置
  learning_rates:
    policy_lr: 0.0003   # 策略网络学习率（降低以提高稳定性）
    value_lr: 0.001     # 价值网络学习率（降低以提高稳定性）
    q_lr: 0.001         # Q网络学习率（提高以更快更新Q值）
  
  # 软更新参数
  tau: 0.01             # 目标网络软更新系数
  
  # 熵温度参数
  target_entropy: -2.0  # 目标熵值（建议设置为 -action_dim，对于2维动作空间为-2）

# 状态和动作空间配置
space:
  state_dim: 7          # 状态维度
  action_dim: 2         # 动作维度（由环境自动设置）
  
# 输出配置
output:
  save_interval: 20     # 模型保存间隔（轮数）
  save_threshold: 200   # 开始保存模型的最小轮数
  output_dir: "output"  # 输出目录

# 噪声配置（用于探索）
noise:
  ou_noise: true        # 是否使用OU噪声
  noise_episodes: 20    # 添加噪声的轮数

# 随机种子配置（用于实验复现）
seed:
  enabled: true         # 是否启用固定种子
  base_seed: 42         # 基础种子值
  use_episode_seed: true  # 是否为每轮训练使用不同种子

# 设备配置
device:
  use_cuda: true        # 是否使用CUDA (如果可用)
  cuda_device: 0        # CUDA设备ID (默认使用GPU 0)


